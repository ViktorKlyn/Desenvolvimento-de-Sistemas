<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Hobby</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h1 class="text-center mb-4">Meu Hobby Favorito</h1>

    <form id="hobbyForm" class="card p-4 shadow">
      <div class="row mb-3">
        <div class="col">
          <label for="nome" class="form-label">Nome</label>
          <input type="text" id="nome" class="form-control" required>
        </div>
        <div class="col">
          <label for="cidade" class="form-label">Cidade</label>
          <input type="text" id="cidade" class="form-control" required>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col">
          <label for="idade" class="form-label">Idade</label>
          <input type="number" id="idade" class="form-control" min="1" required>
        </div>
        <div class="col">
          <label for="hobby" class="form-label">Hobby</label>
          <select id="hobby" class="form-select" required>
            <option value="">Selecione...</option>
            <option value="Fotografia">Fotografia</option>
            <option value="Leitura">Leitura</option>
            <option value="Esportes">Esportes</option>
            <option value="Jogos">Jogos</option>
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Nível de Experiência</label><br>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="nivel" value="Iniciante" required>
          <label class="form-check-label">Iniciante</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="nivel" value="Intermediário">
          <label class="form-check-label">Intermediário</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="nivel" value="Avançado">
          <label class="form-check-label">Avançado</label>
        </div>
      </div>

      <div class="mb-3">
        <label for="tempo" class="form-label">Tempo dedicado por semana (horas)</label>
        <input type="number" id="tempo" class="form-control" min="1" required>
      </div>

      <div class="mb-3">
        <label for="descricao" class="form-label">Descrição da atividade</label>
        <textarea id="descricao" class="form-control" rows="3" maxlength="200"></textarea>
        <small id="contador" class="text-muted">0 / 200 caracteres</small>
      </div>

      <button type="submit" class="btn btn-primary w-100">Gerar Resumo</button>
    </form>

    <div id="resultado" class="mt-4"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
