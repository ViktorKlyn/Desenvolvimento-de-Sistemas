<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Formulário para Cadstro de Contatos</title>
</head>
<body>
    <header>
        <p class="autor">João Victor Klein</p>
    </header>
    <main>
        <div class="container">
            <h2>Cadastro de Contatos</h2>
            <form>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite o nome">

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="Digite o e-mail">

                <label>Sexo:</label>
                <div class="radio-group">
                    <label><input type="radio" name="sexo" value="masculino">Masculino</label>
                    <label><input type="radio" name="sexo" value="feminino">Feminino</label>
                    <label><input type="radio" name="sexo" value="outro">Outro</label>
                </div>

                <label>Interesses:</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="interesses" value="tecnologia">Tecnologia</label>
                    <label><input type="checkbox" name="interesses" value="esporte">Esporte</label>
                    <label><input type="checkbox" name="interesses" value="musica">Música</label>
                </div>

                <label for="cidade">Cidade:</label>
                <select name="cidade" id="cidade">
                    <option value="">Selecione...</option>
                    <option value="londrina">Londrina</option>
                    <option value="curitiba">Curitiba</option>
                    <option value="sao_paulo">São Paulo</option>
                    <option value="rio_de_janeiro">Rio de Janeiro</option>
                </select>

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </main>
    <footer>
        <p class="universidade">Universidade Positivo</p>
    </footer>
</body>
</html>
